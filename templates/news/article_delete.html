{% extends 'default.html' %}

{% block title %}Удаление статьи{% endblock %}

{% block content %}
    <h2>Удаление статьи</h2>
    
    <p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'news_list' %}">Отмена</a>
    </form>
{% endblock %}
